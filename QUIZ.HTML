<!DOCTYPE html>
<html>
<head>
    <title>Student Marksheet</title>

    <style>
       body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            width: 550px;
            margin: 40px auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 10px 20px;
            width: 95%;
            background-color: #4e73df;
            color: white;


            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #2e59d9;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Enter Student Details</h2>

    <input type="text" id="name" placeholder="Student Name"><br>
    <input type="text" id="roll" placeholder="Roll Number"><br>

    <input type="number" id="sub1" placeholder="Subject 1 Marks"><br>
    <input type="number" id="sub2" placeholder="Subject 2 Marks"><br>
    <input type="number" id="sub3" placeholder="Subject 3 Marks"><br>
    <input type="number" id="sub4" placeholder="Subject 4 Marks"><br>
    <input type="number" id="sub5" placeholder="Subject 5 Marks"><br>

    <button onclick="generateMarksheet()">Generate Marksheet</button>
</div>\


<script>
function generateMarksheet() {

    // Get input values
    let name = document.getElementById("name").value;
    let roll = document.getElementById("roll").value;

    let s1 = Number(document.getElementById("sub1").value);
    let s2 = Number(document.getElementById("sub2").value);
    let s3 = Number(document.getElementById("sub3").value);
    let s4 = Number(document.getElementById("sub4").value);
    let s5 = Number(document.getElementById("sub5").value);

    // Calculate total and percentage
    let total = s1 + s2 + s3 + s4 + s5;
    let percentage = total / 5;

    // Determine grade
    let grade;
    if (percentage >= 90) grade = "A+";
    else if (percentage >= 80) grade = "A";
    else if (percentage >= 70) grade = "B";
    else if (percentage >= 60) grade = "C";
    else if (percentage >= 50) grade = "D";
    else grade = "Fail";

    // Open new tab
    let newTab = window.open("", "_blank");

    
        <div class="marksheet">
            <h2>Student Marksheet</h2>
// Marksheet design in new tab
    newTab.document.write(`
        <html>
        <head>
            <title>Marksheet</title>
            <style>
                body {
                    font-family: Arial;
                    background-color: #f9f9f9;
                    padding: 20px;
                }

                .marksheet {
                    width: 600px;
                    margin: auto;
                    background: white;
                    padding: 20px;
                    border: 2px solid black;
                }

                h2 {
                    text-align: center;
                    background-color: #4CAF50;
                    color: white;
                    padding: 10px;
                }

                table {
                    width: 100%;
                    border-collapse: collapse;
                    margin-top: 20px;
                }

                table, th, td {
                    border: 1px solid black;
                    text-align: center;
                    padding: 10px;
                }

                .result {
                    margin-top: 20px;
                    font-size: 18px;
                }
            </style>
        </head>

        <body>


            <p><b>Name:</b> ${name}</p>
            <p><b>Roll No:</b> ${roll}</p>

            <table>
                <tr>
                    <th>Subject</th>
                    <th>Marks</th>
                </tr>
                <tr><td>Subject 1</td><td>${s1}</td></tr>
                <tr><td>Subject 2</td><td>${s2}</td></tr>
                <tr><td>Subject 3</td><td>${s3}</td></tr>
                <tr><td>Subject 4</td><td>${s4}</td></tr>
                <tr><td>Subject 5</td><td>${s5}</td></tr>
            </table>

            <div class="result">
                <p><b>Total Marks:</b> ${total}</p>
                <p><b>Percentage:</b> ${percentage.toFixed(2)}%</p>
                <p><b>Grade:</b> ${grade}</p>
            </div>
        </div>

        </body>
        </html>
    `);

    newTab.document.close();
}
</script>

</body>
</html>
